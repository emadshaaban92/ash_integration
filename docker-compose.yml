services:
  app:
    build:
      dockerfile: Dockerfile.dev
    command: tail -f /dev/null
    depends_on:
      - db
    environment:
      - MIX_OS_DEPS_COMPILE_PARTITION_COUNT=8
      - DEMO
      - OTEL_SERVICE_NAME=AshIntegrationExample
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - KAFKA_HOSTS
      - KAFKA_HOST
      - KAFKA_TOPIC_MASTER_DATA
      - KAFKA_TOPIC_COMMANDS
    labels:
      otel.service.name: "AshIntegrationExample"

    volumes:
      - ./.:/home/ubuntu/workspace
  db:
    image: postgres:18
    environment:
      - POSTGRES_PASSWORD=admin
      - POSTGRES_USER=admin
      - POSTGRES_DB=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_INITDB_ARGS=--locale-provider=builtin --locale=C.UTF-8 --data-checksums
    volumes:
      - db-data:/var/lib/postgresql/data
    shm_size: '4gb'
    command: [ "-c", "shared_buffers=4GB", "-c", "random_page_cost=1.1", "-c", "work_mem=20971kB", "-c", "effective_io_concurrency=200", "-c", "shared_preload_libraries=pg_stat_statements,sslinfo", "-c", "max_connections=500" ]

  redpanda:
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      # Address the broker advertises to clients that connect to the Kafka API.
      # Use the internal addresses to connect to the Redpanda brokers'
      # from inside the same Docker network.
      # Use the external addresses to connect to the Redpanda brokers'
      # from outside the Docker network.
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      # Address the broker advertises to clients that connect to the HTTP Proxy.
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      # Redpanda brokers use the RPC API to communicate with each other internally.
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      # Mode dev-container uses well-known configuration properties for development in containers.
      - --mode dev-container
      # Tells Seastar (the framework Redpanda uses under the hood) to use 1 core on the system.
      - --smp 1
      - --default-log-level=info
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.2
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    ports:
      - 18081:18081
      - 18082:18082
      - 19092:19092
      - 19644:9644
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.1.0
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - 8080:8080
    depends_on:
      - redpanda

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - 16686:16686

volumes:
  db-data:
  redpanda-data:
