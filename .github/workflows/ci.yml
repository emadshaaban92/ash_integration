name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MIX_ENV: test

jobs:
  # Compile + test across the supported Elixir/OTP range.
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.19"
            otp: "27"
          - elixir: "1.19"
            otp: "28"
          - elixir: "1.20"
            otp: "28"
          - elixir: "1.20"
            otp: "29"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Elixir / OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps and _build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test --warnings-as-errors

  # Version-independent checks — run once.
  quality:
    name: Quality (format · credo · sobelow · audits)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Elixir / OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Cache deps and _build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-quality-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-quality-

      - name: Install dependencies
        run: mix deps.get

      - name: Check for unused dependencies in mix.lock
        run: mix deps.unlock --check-unused

      # !cancelled() so one run surfaces every failure, not just the first.
      - name: Check formatting
        if: ${{ !cancelled() }}
        run: mix format --check-formatted

      - name: Static analysis (Credo)
        if: ${{ !cancelled() }}
        run: mix credo

      - name: Security analysis (Sobelow)
        if: ${{ !cancelled() }}
        run: mix sobelow

      - name: Dependency vulnerability audit (mix deps.audit)
        if: ${{ !cancelled() }}
        run: mix deps.audit

      - name: Retired package audit (mix hex.audit)
        if: ${{ !cancelled() }}
        run: mix hex.audit

  # Measure and surface coverage. The library has no Repo of its own, so its
  # outbound runtime is exercised through the example app's integration suite;
  # test/test_helper.exs instruments the :ash_integration dependency so the
  # report covers the library too. Informational for now (no threshold) — the
  # per-file table is printed in the job log.
  example-coverage:
    name: Coverage (library via example app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Elixir / OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Cache example deps and _build
        uses: actions/cache@v5
        with:
          path: |
            example/deps
            example/_build
          key: ${{ runner.os }}-mix-example-cover-${{ hashFiles('example/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-example-cover-

      # config/test.exs connects to host "db"; point it at the service on localhost.
      - name: Map the "db" host to localhost
        run: echo "127.0.0.1 db" | sudo tee -a /etc/hosts

      - name: Install example dependencies
        run: mix deps.get

      - name: Set up the test database
        run: mix ash.setup

      - name: Run coverage (library + example app)
        run: mix coveralls

  # Scan the example app's real router/endpoint — coverage the library (no
  # router of its own) can't get. See example/.sobelow-conf.
  sobelow-example:
    name: Sobelow (example app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Elixir / OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Cache example deps and _build
        uses: actions/cache@v5
        with:
          path: |
            example/deps
            example/_build
          key: ${{ runner.os }}-mix-example-${{ hashFiles('example/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-example-

      - name: Install Sobelow (archive)
        run: mix archive.install hex sobelow 0.14.1 --force

      - name: Install example dependencies
        run: mix deps.get

      - name: Security analysis (Sobelow, example router/endpoint)
        run: mix sobelow
